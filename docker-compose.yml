services:

  mongodb:
    image: mongo:7.0
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - academic-network

  student-service:
    build: ./student-service
    container_name: student-service
    ports:
      - "3001:3001"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/db_student
    depends_on:
      - mongodb
    networks:
      - academic-network

networks:
  academic-network:
    driver: bridge

volumes:
  mongodb_data: